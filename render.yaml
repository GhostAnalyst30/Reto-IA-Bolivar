services:
  - type: web
    name: reto-ia-bolivar-api
    runtime: python
    rootDir: apps/api
    buildCommand: python --version && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL_TUTOR
        value: openai/gpt-oss-120b:free
      - key: LLM_MODEL_DIRECTOR
        value: google/gemma-4-31b-it:free
      - key: LLM_MODEL_PATH
        value: google/gemma-4-31b-it:free
      - key: LLM_OPENROUTER_FREE_MODELS
        value: openai/gpt-oss-120b:free,google/gemma-4-31b-it:free,meta-llama/llama-3.2-3b-instruct:free,qwen/qwen-2.5-7b-instruct:free,google/gemini-2.0-flash-exp:free
      - key: LLM_MAX_OPENROUTER_ATTEMPTS
        value: "5"
      - key: LLM_PROVIDER
        value: openrouter
      - key: ALLOWED_ORIGINS
        sync: false
      - key: INTERNAL_REGISTER_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: PSYCHOLOGIST_EMAIL
        value: psicologo@utb.edu.co
      - key: GUARDRAILS_ENABLED
        value: "true"
