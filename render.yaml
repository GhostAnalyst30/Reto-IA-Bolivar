services:
  - type: web
    name: reto-ia-bolivar-api
    runtime: python
    rootDir: apps/api
    buildCommand: python --version && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL_TUTOR
        value: openai/gpt-oss-120b:free
      - key: LLM_MODEL_DIRECTOR
        value: google/gemma-4-31b-it:free
      - key: LLM_MODEL_PATH
        value: google/gemma-4-31b-it:free
      - key: LLM_PROVIDER
        value: openrouter
      - key: ALLOWED_ORIGINS
        sync: false
      - key: INTERNAL_REGISTER_KEY
        sync: false
      - key: APP_URL
        sync: false
